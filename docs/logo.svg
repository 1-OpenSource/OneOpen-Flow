  <path d="M18 22h10M28 22v10M28 32h10M38 32v10M38 42h8" fill="none" stroke="#ecfeff" stroke-width="2.2" opacity=".88" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Node dots -->
  <circle cx="18" cy="22" r="3.2" fill="#ecfeff"/>
