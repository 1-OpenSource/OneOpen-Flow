  <circle cx="28" cy="32" r="3.2" fill="#ecfeff"/>
  <circle cx="38" cy="32" r="3.2" fill="#ecfeff"/>
  <circle cx="38" cy="42" r="3.2" fill="#ecfeff"/>
  <circle cx="46" cy="42" r="3.2" fill="#ecfeff"/>
